services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.10
    container_name: gp_clickhouse
    hostname: gp_clickhouse
    environment:
      CLICKHOUSE_DB: ${DWH_DB}
      CLICKHOUSE_USER: ${DWH_USER}
      CLICKHOUSE_PASSWORD: ${DWH_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    stop_grace_period: 2m
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./infra/clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./data:/var/lib/clickhouse/user_files/import:ro

  dbt:
    build:
      context: .
      dockerfile: infra/dbt/Dockerfile
      args:
        DBT_CORE_VERSION: ${DBT_CORE_VERSION}
        DBT_CH_VERSION: ${DBT_CH_VERSION}
    container_name: dbt
    hostname: dbt
    depends_on:
      clickhouse:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    working_dir: /usr/app/dbt
    volumes:
      - ./dbt:/usr/app/dbt

  prefect:
    build:
      context: .
      dockerfile: infra/prefect/Dockerfile
      args:
        DBT_CORE_VERSION: ${DBT_CORE_VERSION}
        DBT_CH_VERSION: ${DBT_CH_VERSION}
    container_name: prefect
    hostname: prefect
    depends_on:
      clickhouse:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      PREFECT_API_EVENTS_STREAM_OUT_ENABLED: "false"
      PREFECT_SERVER_EPHEMERAL_STARTUP_TIMEOUT_SECONDS: "60"
      DO_NOT_TRACK: "1"
    working_dir: /usr/app
    volumes:
      - ./:/usr/app
    command: ["tail", "-f", "/dev/null"]

  evidence:
    build:
      context: .
      dockerfile: infra/evidence/Dockerfile
    container_name: evidence
    hostname: evidence
    working_dir: /usr/app/evidence
    ports:
      - "3000:3000"
    volumes:
      - ./evidence:/usr/app/evidence
    command: ["sh", "-lc", "npm run dev -- --host 0.0.0.0 --port 3000"]

volumes:
  clickhouse_data:
  clickhouse_logs:
