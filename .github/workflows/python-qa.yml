name: Python QA

"on":
  pull_request:
    paths:
      - ".github/workflows/python-qa.yml"
      - "ingestion/**"
      - "orchestration/**"
      - "publish/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.txt"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/python-qa.yml"
      - "ingestion/**"
      - "orchestration/**"
      - "publish/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.txt"

permissions:
  contents: read

jobs:
  qa-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check ingestion orchestration tests

      - name: Test
        run: pytest
