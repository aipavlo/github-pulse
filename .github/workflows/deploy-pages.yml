name: Deploy Pages

on:
  workflow_dispatch:
  push:
    tags:
      - "pages-*"

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: evidence/.nvmrc
          cache: npm
          cache-dependency-path: evidence/package-lock.json

      - name: Use npm 11
        run: npm install --global npm@11.12.1

      - name: Install Evidence dependencies
        working-directory: evidence
        run: npm ci

      - name: Build source cache
        working-directory: evidence
        run: npm run sources

      - name: Build static site
        working-directory: evidence
        run: npm run build:strict

      - name: Verify Pages artifact exists
        run: |
          test -f evidence/build/index.html
          test -d evidence/build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: evidence/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
