[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["ingestion", "orchestration", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["ingestion", "orchestration"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
