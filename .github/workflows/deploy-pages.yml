name: Deploy Pages

on:
  workflow_dispatch:
  push:
    tags:
      - "pages-*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: evidence/.nvmrc
          cache: npm
          cache-dependency-path: evidence/package-lock.json

      - name: Use npm 11
        run: npm install --global npm@11.12.1

      - name: Install Evidence dependencies
        working-directory: evidence
        run: npm ci

      - name: Build source cache
        working-directory: evidence
        run: npm run sources

      - name: Build static site
        working-directory: evidence
        run: npm run build:strict

      - name: Verify Pages artifact exists
        run: |
          test -f evidence/build/index.html
          test -d evidence/build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: evidence/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
